<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>SAE26_AI43_HIS_C07_OA1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="resources/js/library/phaser.min.js"></script>
    <link rel="stylesheet" href="resources/css/game.css" />
    <style type="text/css">

        @font-face {
            font-family: 'Nunito-ExtraBold';
            src: url('resources/fonts/Nunito-ExtraBold.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Nunito';
            src: url('resources/fonts/Nunito-Regular.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Nunito-Bold';
            src: url('resources/fonts/Nunito-Bold.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Nunito-Black';
            src: url('resources/fonts/Nunito-Black.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Nunito-Medium';
            src: url('resources/fonts/Nunito-Regular.ttf') format('truetype');
        }

        html,
        body {
            height: 100%;
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            font: caption;
            overflow: hidden;
        }

        #SAE26_AI43_HIS_C07_OA1 {
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            aspect-ratio: 16 / 9;
            display: block;
        }

        #loading {
            font-family: Nunito-ExtraBold, sans-serif;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            display: none;
        }
    </style>

    <script type="module">
        import { Boot } from './resources/js/library/base/Boot.js';
        import { Preload } from './resources/game/cenas/Preload.js';
        import { Capa } from './resources/game/cenas/Capa.js';
        import { Intro } from './resources/game/cenas/Intro.js';
        import { Game } from './resources/game/cenas/Game.js';
        import SoundManager from './resources/js/library/managers/SoundManager.js';

        const config = {
            type: Phaser.AUTO,
            width: 1920,
            height: 1080,
            backgroundColor: '#000',
            scale: {
                mode: Phaser.Scale.ScaleModes.FIT,
                parent: 'SAE26_AI43_HIS_C07_OA1',
                width: 1920,
                height: 1080,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                autoRound: true,
                expandParent: true
            },
            scene: [Boot, Preload, Capa, Intro, Game],
            audio: {
                disableWebAudio: false
            },
            dom: {
                createContainer: true
            },
            callbacks: {
                postBoot: function (game) {
                    SoundManager.init(game);
                }
            },
            render: {
                antialias: true,
                pixelArt: false
            }
        };

        const game = new Phaser.Game(config);

        const ajustarEscala = () => {
            setTimeout(() => {
                game.canvas.style.display = 'block';
                setTimeout(() => {
                    game.scale.refresh();
                    game.scale.setGameSize(1920, 1080);
                }, 100);
            }, 100);
        };

        window.addEventListener('resize', () => setTimeout(ajustarEscala, 500));
        window.addEventListener('orientationchange', () => setTimeout(ajustarEscala, 800));
        if (window.orientation !== undefined) {
            window.addEventListener('orientationchange', () => {
                setTimeout(ajustarEscala, 1000);
            });
        }
        window.addEventListener('load', ajustarEscala);
    </script>

</head>

<body id="SAE26_AI43_HIS_C07_OA1">
    <h2 style="display: none;">Objeto Digital de Aprendizagem</h2>
    <div id="loading">Carregando...</div>
</body>

</html>
